<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Bridgerton</title>

<style>

html,body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
}

/* CAPA */

#capa{
position:fixed;
inset:0;
width:100vw;
height:100vh;
background:#000;
z-index:20;
transition:opacity .6s ease;
}

#capa img{
width:100%;
height:100%;
object-fit:cover;
}

#abrirConvite{
position:absolute;
inset:0;
background:transparent;
border:0;
cursor:pointer;
}

/* CONTEÚDO */

#container{
position:fixed;
inset:0;
width:100vw;
height:100vh;
opacity:0;
transition:opacity 1s;
}

#video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

/* BOTÕES */

.btn{
position:absolute;
background:transparent;
border:none;
cursor:pointer;
}

.btn-local{left:18%;top:69%;width:17%;height:10%;}
.btn-confirmar{left:41%;top:69%;width:17%;height:10%;}
.btn-presente{left:64%;top:69%;width:17%;height:10%;}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.8);
backdrop-filter:blur(6px);
z-index:100;
}

.overlay img{
max-width:90%;
max-height:90%;
}

.fechar{
position:absolute;
top:20px;
right:20px;
font-size:30px;
color:#fff;
background:none;
border:none;
cursor:pointer;
}

/* PARTÍCULAS */

.particula{
position:fixed;
width:4px;
height:4px;
background:#ffd700;
border-radius:50%;
opacity:.6;
animation:brilho 4s infinite;
}

@keyframes brilho{
0%{opacity:0}
50%{opacity:.8}
100%{opacity:0}
}

</style>
</head>

<body>

<!-- CAPA -->

<div id="capa">
<img src="capa.png" alt="Capa do convite">
<button id="abrirConvite"></button>
</div>

<!-- CONTEÚDO -->

<div id="container">

<video id="video" autoplay muted playsinline loop>
<source src="video.mp4" type="video/mp4">
</video>

<a href="https://maps.app.goo.gl/zSL51nyuTbtPviSh9" target="_blank" class="btn btn-local"></a>

<a href="https://wa.me/559799034158?text=É%20com%20muita%20alegria%20que%20confirmo%20minha%20presença%20no%20seu%20casamento!" target="_blank" class="btn btn-confirmar"></a>

<button class="btn btn-presente" id="btnPresente"></button>

</div>

<!-- PRESENTES -->

<div id="overlay" class="overlay">

<button class="fechar" id="fechar">&times;</button>

<img src="presente.png" alt="Lista de presentes">

</div>

<script>

const abrir=document.getElementById("abrirConvite")
const capa=document.getElementById("capa")
const container=document.getElementById("container")
const video=document.getElementById("video")

const overlay=document.getElementById("overlay")
const btnPresente=document.getElementById("btnPresente")
const fechar=document.getElementById("fechar")

const musica=new Audio("brid.mp3")
musica.volume=0.7

abrir.onclick=()=>{

capa.style.opacity="0"

setTimeout(()=>{
capa.style.display="none"
},600)

container.style.opacity="1"

video.muted=false
video.play()

musica.play().catch(()=>{})

particulas()

}

btnPresente.onclick=()=>{
overlay.style.display="flex"
}

fechar.onclick=()=>{
overlay.style.display="none"
}

overlay.onclick=(e)=>{
if(e.target===overlay){
overlay.style.display="none"
}
}

function particulas(){

for(let i=0;i<30;i++){

const p=document.createElement("div")

p.className="particula"

p.style.left=Math.random()*100+"vw"
p.style.top=Math.random()*100+"vh"

document.body.appendChild(p)

}

}

</script>

</body>
</html>
