<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Convite Bridgerton</title>

<style>

html,body{
margin:0;
padding:0;
background:#000;
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
}

/* CAPA */

#capa{
position:fixed;
inset:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#000;
z-index:20;
transition:opacity .6s ease;
}

#canvas1080{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100vw;
height:calc(100vw*1850/1080);
}

#capa img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
}

#abrirConvite{
position:absolute;
inset:0;
width:100%;
height:100%;
background:transparent;
border:0;
cursor:pointer;
z-index:30;
}

/* CONTAINER */

#container-principal{
position:fixed;
inset:0;
width:100vw;
height:100vh;
overflow:hidden;
background:#000;
opacity:0;
transition:opacity 1s ease;
}

/* VIDEO */

#canvas-video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100vw;
height:calc(100vw*1850/1080);
}

#video{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover;
pointer-events:none;
}

/* BOTÕES */

#botoes{
position:absolute;
inset:0;
z-index:10;
}

.btn{
position:absolute;
display:block;
background:transparent;
cursor:pointer;
border:none;
}

/* BOTÕES CENTRALIZADOS */

.btn-local{left:18%;top:69%;width:17%;height:10%;}
.btn-confirmar{left:41%;top:69%;width:17%;height:10%;}
.btn-presente{left:64%;top:69%;width:17%;height:10%;}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.8);
backdrop-filter:blur(6px);
z-index:100;
}

.overlay img{
max-width:90%;
max-height:90%;
}

.fechar{
position:absolute;
top:20px;
right:20px;
color:#fff;
font-size:30px;
background:none;
border:none;
cursor:pointer;
}

/* PARTÍCULAS */

.particula{
position:fixed;
width:4px;
height:4px;
background:#ffd700;
border-radius:50%;
opacity:.6;
animation:brilho 4s infinite;
}

@keyframes brilho{
0%{opacity:0}
50%{opacity:.8}
100%{opacity:0}
}

</style>
</head>

<body>

<!-- CAPA -->

<div id="capa">
<div id="canvas1080">
<img src="assets/media/capa.png">
</div>
<button id="abrirConvite"></button>
</div>

<!-- CONTEÚDO -->

<div id="container-principal">

<div id="canvas-video">

<video id="video" autoplay muted playsinline>
<source src="assets/media/video.mp4" type="video/mp4">
</video>

<div id="botoes">

<a href="https://maps.app.goo.gl/zSL51nyuTbtPviSh9" target="_blank" class="btn btn-local"></a>

<a href="https://wa.me/559799034158?text=É%20com%20muita%20alegria%20que%20confirmo%20minha%20presença%20no%20seu%20casamento!" target="_blank" class="btn btn-confirmar"></a>

<button class="btn btn-presente" id="btn-presente"></button>

</div>

</div>

</div>

<!-- OVERLAY PRESENTES -->

<div id="overlay-presente" class="overlay">

<button class="fechar" id="fechar-overlay">&times;</button>

<img src="assets/media/presente.png">

</div>

<script>

document.addEventListener("DOMContentLoaded",()=>{

const capa=document.getElementById("capa")
const abrir=document.getElementById("abrirConvite")
const video=document.getElementById("video")
const overlay=document.getElementById("overlay-presente")
const btnPresente=document.getElementById("btn-presente")
const btnFechar=document.getElementById("fechar-overlay")
const container=document.getElementById("container-principal")

const musica=new Audio("assets/media/brid.mp3")

abrir.addEventListener("click",()=>{

capa.style.opacity="0"

setTimeout(()=>{
capa.style.display="none"
},500)

container.style.opacity="1"

video.muted=false
video.play()

musica.play().catch(()=>{})

iniciarParticulas()

})

btnPresente.addEventListener("click",()=>{
overlay.style.display="flex"
})

btnFechar.addEventListener("click",()=>{
overlay.style.display="none"
})

overlay.addEventListener("click",(e)=>{
if(e.target===overlay)overlay.style.display="none"
})

})

function iniciarParticulas(){

for(let i=0;i<30;i++){

const p=document.createElement("div")

p.className="particula"

p.style.left=Math.random()*100+"vw"
p.style.top=Math.random()*100+"vh"

document.body.appendChild(p)

}

}

</script>

</body>
</html>
